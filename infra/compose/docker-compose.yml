version: '3.9'

# HomeTusk Stage 1 Development Stack
# Usage:
#   cd infra/compose
#   docker-compose up -d
#
# Services:
#   - postgres:  localhost:5432 (hometusk/hometusk_dev)
#   - keycloak:  localhost:8180 (admin/admin)
#   - backend:   localhost:8080 (when built)

services:
  postgres:
    image: postgres:15-alpine
    container_name: hometusk-postgres
    environment:
      POSTGRES_USER: hometusk
      POSTGRES_PASSWORD: hometusk_dev
      POSTGRES_DB: hometusk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hometusk -d hometusk"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hometusk

  keycloak:
    build:
      context: ../keycloak
      dockerfile: Dockerfile
    image: hometusk-keycloak:23.0.6-russian-providers
    container_name: hometusk-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/hometusk
      KC_DB_USERNAME: hometusk
      KC_DB_PASSWORD: hometusk_dev
      KC_DB_SCHEMA: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - hometusk

  keycloak-social-idps:
    image: hometusk-keycloak:23.0.6-russian-providers
    container_name: hometusk-keycloak-social-idps
    entrypoint: ["/bin/sh", "/opt/hometusk/configure-social-idps.sh"]
    environment:
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: hometusk
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      HOMETUSK_WEB_OIDC_CLIENT_ID: ${HOMETUSK_WEB_OIDC_CLIENT_ID:-hometusk-web}
      VITE_OIDC_REDIRECT_URI: ${VITE_OIDC_REDIRECT_URI:-}
      HOMETUSK_WEB_BASE_URL: ${HOMETUSK_WEB_BASE_URL:-}
      HOMETUSK_IDP_YANDEX_CLIENT_ID: ${HOMETUSK_IDP_YANDEX_CLIENT_ID:-}
      HOMETUSK_IDP_YANDEX_CLIENT_SECRET: ${HOMETUSK_IDP_YANDEX_CLIENT_SECRET:-}
      HOMETUSK_IDP_YANDEX_DEFAULT_SCOPE: ${HOMETUSK_IDP_YANDEX_DEFAULT_SCOPE:-login:info login:email login:avatar}
      HOMETUSK_IDP_YANDEX_FORCE_CONFIRM: ${HOMETUSK_IDP_YANDEX_FORCE_CONFIRM:-false}
      HOMETUSK_IDP_YANDEX_HOSTED_DOMAIN: ${HOMETUSK_IDP_YANDEX_HOSTED_DOMAIN:-}
      HOMETUSK_IDP_VKID_CLIENT_ID: ${HOMETUSK_IDP_VKID_CLIENT_ID:-}
      HOMETUSK_IDP_VKID_CLIENT_SECRET: ${HOMETUSK_IDP_VKID_CLIENT_SECRET:-}
    volumes:
      - ../keycloak/configure-social-idps.sh:/opt/hometusk/configure-social-idps.sh:ro
    depends_on:
      keycloak:
        condition: service_healthy
    networks:
      - hometusk

  # Uncomment to run backend in Docker (alternative to local ./gradlew bootRun)
  # backend:
  #   build:
