version: '3.9'

# HomeTusk Stage 1 Development Stack
# Usage:
#   cd infra/compose
#   docker-compose up -d
#
# Services:
#   - postgres:  localhost:5432 (hometusk/hometusk_dev)
#   - keycloak:  localhost:8180 (admin/admin)
#   - backend:   localhost:8080 (when built)

services:
  postgres:
    image: postgres:15-alpine
    container_name: hometusk-postgres
    environment:
      POSTGRES_USER: hometusk
      POSTGRES_PASSWORD: hometusk_dev
      POSTGRES_DB: hometusk
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hometusk -d hometusk"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - hometusk

  keycloak:
    image: quay.io/keycloak/keycloak:23.0
    container_name: hometusk-keycloak
    command: start-dev --import-realm
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/hometusk
      KC_DB_USERNAME: hometusk
      KC_DB_PASSWORD: hometusk_dev
      KC_DB_SCHEMA: keycloak
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
      KC_HEALTH_ENABLED: "true"
    ports:
      - "8180:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\\r\\nHost: localhost\\r\\nConnection: close\\r\\n\\r\\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - hometusk

  # Uncomment to run backend in Docker (alternative to local ./gradlew bootRun)
  # backend:
  #   build:
  #     context: ../../services/backend
  #     dockerfile: docker/Dockerfile
  #   container_name: hometusk-backend
  #   environment:
  #     SPRING_PROFILES_ACTIVE: local
  #     SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/hometusk
  #     SPRING_DATASOURCE_USERNAME: hometusk
  #     SPRING_DATASOURCE_PASSWORD: hometusk_dev
  #     SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: http://keycloak:8080/realms/hometusk
  #     SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/hometusk/protocol/openid-connect/certs
  #   ports:
  #     - "8080:8080"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy
  #     keycloak:
  #       condition: service_healthy
  #   networks:
  #     - hometusk

volumes:
  postgres_data:
    name: hometusk_postgres_data

networks:
  hometusk:
    name: hometusk_network
