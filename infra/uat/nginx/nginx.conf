worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 512;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time';

    access_log /var/log/nginx/access.log main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;

    # --- Gzip ---
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # --- Rate limiting (login/commands protection) ---
    limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

    # --- Upstreams ---
    upstream backend {
        server backend:8080;
    }

    upstream keycloak {
        server keycloak:8080;
    }

    # --- HTTP -> HTTPS redirect (enable when SSL is configured) ---
    # server {
    #     listen 80;
    #     server_name _;
    #     return 301 https://$host$request_uri;
    # }

    server {
        listen 80;
        server_name _;

        # --- SSL ---
        listen 443 ssl http2;
        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_prefer_server_ciphers on;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        # --- Security headers ---
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # --- Max body size (for ASR audio uploads) ---
        client_max_body_size 12m;

        location = /healthz {
            access_log off;
            default_type text/plain;
            return 200 "ok\n";
        }

        # ==========================================
        # Backend API
        # ==========================================
        location /api/v1/ {
            limit_req zone=api burst=50 nodelay;

            proxy_pass http://backend/api/v1/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeouts for long-running commands (AI Platform)
            proxy_connect_timeout 10s;
            proxy_read_timeout 30s;
            proxy_send_timeout 10s;
        }

        # Backend internal endpoints (auth session, etc.)
        location /auth/ {
            limit_req zone=auth burst=20 nodelay;

            proxy_pass http://backend/auth/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Actuator health (for monitoring, restrict in production)
        location /actuator/health {
            proxy_pass http://backend/actuator/health;
            proxy_set_header Host $host;
        }

        # Swagger UI (optional, can be disabled in production)
        location /swagger-ui.html {
            proxy_pass http://backend/swagger-ui.html;
            proxy_set_header Host $host;
        }

        location /swagger-ui/ {
            proxy_pass http://backend/swagger-ui/;
            proxy_set_header Host $host;
        }

        location /api-docs {
            proxy_pass http://backend/api-docs;
            proxy_set_header Host $host;
        }

        # ==========================================
        # Keycloak (OIDC auth)
        # ==========================================
        location /realms/ {
            proxy_pass http://keycloak/realms/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
        }

        location /resources/ {
            proxy_pass http://keycloak/resources/;
            proxy_set_header Host $host;
        }

        location /js/ {
            proxy_pass http://keycloak/js/;
            proxy_set_header Host $host;
        }

        # ==========================================
        # SPA (web client)
        # ==========================================

        # Static assets with long cache
        location /assets/ {
            root /usr/share/nginx/html;
            expires 30d;
            add_header Cache-Control "public, immutable";
        }

        # SPA fallback: everything else -> index.html
        location / {
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;

            # No cache for index.html (always get latest version)
            location = /index.html {
                add_header Cache-Control "no-cache, no-store, must-revalidate";
            }
        }
    }
}
