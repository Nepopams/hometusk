# HomeTusk image-based stack for CI/CD delivery.
#
# This file is intended for dev/uat/prod deployments where application images
# are built by GitHub Actions and pulled from GHCR. It deliberately avoids
# local build sections so remote hosts do not need the full source tree.
#
# Required image variables:
#   BACKEND_IMAGE=ghcr.io/<owner>/hometusk-backend
#   WEB_IMAGE=ghcr.io/<owner>/hometusk-web
#   IMAGE_TAG=sha-<commit_sha> or release tag
# Social-auth Keycloak image:
#   KEYCLOAK_IMAGE=<image with keycloak-russian-providers installed>
# GitHub deploy writes this to .env.delivery; manual deployments must set it.

services:
  postgres:
    image: postgres:15-alpine
    container_name: hometusk-${DEPLOY_ENV:-uat}-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hometusk}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      POSTGRES_DB: ${POSTGRES_DB:-hometusk}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hometusk} -d ${POSTGRES_DB:-hometusk}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - internal

  keycloak:
    image: ${KEYCLOAK_IMAGE:-quay.io/keycloak/keycloak:23.0.6}
    container_name: hometusk-${DEPLOY_ENV:-uat}-keycloak
    restart: unless-stopped
    command: start-dev --import-realm --proxy=edge
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-hometusk}
      KC_DB_USERNAME: ${POSTGRES_USER:-hometusk}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      KC_DB_SCHEMA: keycloak
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?Set KEYCLOAK_ADMIN_PASSWORD in .env}
      KEYCLOAK_FRONTEND_URL: ${KEYCLOAK_FRONTEND_URL:-https://${DOMAIN:-localhost}}
      KC_HEALTH_ENABLED: "true"
      KC_HOSTNAME_URL: ${KEYCLOAK_FRONTEND_URL:-https://${DOMAIN:-localhost}}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_RELATIVE_PATH: /
      JAVA_OPTS: ${KEYCLOAK_JAVA_OPTS:--Xms512m -Xmx1024m}
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "exec 3<>/dev/tcp/localhost/8080 && echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3 && cat <&3 | grep -q '200 OK'"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    networks:
      - internal

  keycloak-social-idps:
    image: ${KEYCLOAK_IMAGE:-quay.io/keycloak/keycloak:23.0.6}
    container_name: hometusk-${DEPLOY_ENV:-uat}-keycloak-social-idps
    restart: "no"
    entrypoint: ["/bin/sh", "/opt/hometusk/configure-social-idps.sh"]
    environment:
      KEYCLOAK_BASE_URL: http://keycloak:8080
      KEYCLOAK_REALM: hometusk
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:?Set KEYCLOAK_ADMIN_PASSWORD in .env}
      EXPECT_YANDEX_IDP: ${EXPECT_YANDEX_IDP:-false}
      HOMETUSK_WEB_OIDC_CLIENT_ID: ${HOMETUSK_WEB_OIDC_CLIENT_ID:-hometusk-web}
      VITE_OIDC_REDIRECT_URI: ${VITE_OIDC_REDIRECT_URI:-http://localhost/callback}
      HOMETUSK_WEB_BASE_URL: ${HOMETUSK_WEB_BASE_URL:-}
      HOMETUSK_IDP_YANDEX_CLIENT_ID: ${HOMETUSK_IDP_YANDEX_CLIENT_ID:-}
      HOMETUSK_IDP_YANDEX_CLIENT_SECRET: ${HOMETUSK_IDP_YANDEX_CLIENT_SECRET:-}
      HOMETUSK_IDP_YANDEX_DEFAULT_SCOPE: ${HOMETUSK_IDP_YANDEX_DEFAULT_SCOPE:-login:info login:email login:avatar}
      HOMETUSK_IDP_YANDEX_FORCE_CONFIRM: ${HOMETUSK_IDP_YANDEX_FORCE_CONFIRM:-false}
      HOMETUSK_IDP_YANDEX_HOSTED_DOMAIN: ${HOMETUSK_IDP_YANDEX_HOSTED_DOMAIN:-}
      HOMETUSK_IDP_VKID_CLIENT_ID: ${HOMETUSK_IDP_VKID_CLIENT_ID:-}
      HOMETUSK_IDP_VKID_CLIENT_SECRET: ${HOMETUSK_IDP_VKID_CLIENT_SECRET:-}
    volumes:
      - ./keycloak/configure-social-idps.sh:/opt/hometusk/configure-social-idps.sh:ro
    depends_on:
      keycloak:
        condition: service_healthy
    networks:
      - internal

  backend:
    image: ${BACKEND_IMAGE:?Set BACKEND_IMAGE}:${IMAGE_TAG:?Set IMAGE_TAG}
    container_name: hometusk-${DEPLOY_ENV:-uat}-backend
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-local}
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-hometusk}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-hometusk}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI: ${VITE_OIDC_AUTHORITY:-http://keycloak:8080/realms/hometusk}
      SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI: http://keycloak:8080/realms/hometusk/protocol/openid-connect/certs
      DECISION_PROVIDER: ${DECISION_PROVIDER:-manual}
      DECISION_FALLBACK_ENABLED: ${DECISION_FALLBACK_ENABLED:-true}
      JAVA_OPTS: ${BACKEND_JAVA_OPTS:--XX:+UseContainerSupport -XX:MaxRAMPercentage=60.0 -Xmx1536m -Djava.security.egd=file:/dev/./urandom}
      HOMETUSK_CORS_ALLOWED_ORIGINS: ${HOMETUSK_CORS_ALLOWED_ORIGINS:-http://localhost,https://${DOMAIN:-localhost}}
      HOMETUSK_COOKIE_SECURE: ${HOMETUSK_COOKIE_SECURE:-true}
      HOMETUSK_COOKIE_SAME_SITE: ${HOMETUSK_COOKIE_SAME_SITE:-Lax}
      HOMETUSK_AUTH_KEYCLOAK_BASE_URL: ${HOMETUSK_AUTH_KEYCLOAK_BASE_URL:-http://keycloak:8080}
      HOMETUSK_AUTH_KEYCLOAK_REALM: ${HOMETUSK_AUTH_KEYCLOAK_REALM:-hometusk}
      HOMETUSK_AUTH_KEYCLOAK_USER_CLIENT_ID: ${HOMETUSK_AUTH_KEYCLOAK_USER_CLIENT_ID:-hometusk-api}
      HOMETUSK_AUTH_KEYCLOAK_ADMIN_CLIENT_ID: ${HOMETUSK_AUTH_KEYCLOAK_ADMIN_CLIENT_ID:-hometusk-backend}
      HOMETUSK_AUTH_KEYCLOAK_ADMIN_CLIENT_SECRET: ${HOMETUSK_AUTH_KEYCLOAK_ADMIN_CLIENT_SECRET:-hometusk-backend-secret}
      MANAGEMENT_HEALTH_MAIL_ENABLED: ${MANAGEMENT_HEALTH_MAIL_ENABLED:-false}
      HOMETUSK_VOICE_ENABLED: ${HOMETUSK_VOICE_ENABLED:-false}
      HOMETUSK_VOICE_ASR_ENABLED: ${HOMETUSK_VOICE_ASR_ENABLED:-false}
      AI_PLATFORM_URL: ${AI_PLATFORM_URL:-http://localhost:8090}
      AI_PLATFORM_DECISION_PATH: ${AI_PLATFORM_DECISION_PATH:-/v1/decide}
      AI_PLATFORM_ASR_TRANSCRIBE_PATH: ${AI_PLATFORM_ASR_TRANSCRIBE_PATH:-/v1/asr/transcribe}
      AI_PLATFORM_API_KEY: ${AI_PLATFORM_API_KEY:-}
      AI_PLATFORM_ASR_CONNECT_TIMEOUT_MS: ${AI_PLATFORM_ASR_CONNECT_TIMEOUT_MS:-5000}
      AI_PLATFORM_ASR_READ_TIMEOUT_MS: ${AI_PLATFORM_ASR_READ_TIMEOUT_MS:-30000}
      HOMETUSK_VOICE_ASR_MAX_SIZE_BYTES: ${HOMETUSK_VOICE_ASR_MAX_SIZE_BYTES:-10485760}
      HOMETUSK_VOICE_ASR_REQUESTS_PER_MINUTE: ${HOMETUSK_VOICE_ASR_REQUESTS_PER_MINUTE:-5}
    depends_on:
      postgres:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 90s
    networks:
      - internal

  nginx:
    image: ${WEB_IMAGE:?Set WEB_IMAGE}:${IMAGE_TAG:?Set IMAGE_TAG}
    container_name: hometusk-${DEPLOY_ENV:-uat}-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      backend:
        condition: service_healthy
      keycloak:
        condition: service_healthy
    networks:
      - internal

volumes:
  postgres_data:
    name: hometusk_${DEPLOY_ENV:-uat}_postgres_data

networks:
  internal:
    name: hometusk_${DEPLOY_ENV:-uat}_network
