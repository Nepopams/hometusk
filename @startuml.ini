@startuml
title Vibe-coding pipeline: Human + Claude subagents + Codex (PLAN/APPLY)

skinparam shadowing false

|Human|
start
:Сформулировать Change Request\n(цель/контекст/DoD/ограничения);

|Claude: Orchestrator|
:Прочитать source-of-truth:\nCODEX.md, AGENTS.md, MVP,\nContracts, Diagrams, ADR index;

|Claude: Triage-Manager|
:Сделать triage:\n- type (bugfix/feature/refactor/infra/contract-change)\n- risk (low/med/high)\n- contract impact?\n- нужен ли ADR? (none/lite/full)\n- какие артефакты апдейтить;
:Записать Triage Card (intake) в repo/issue;

if (Нужен ADR?) then (ADR / High-risk)
  |Claude: ADR-Designer|
  :Сформировать ADR (Decision/Consequences);\nобновить ADR index/links;

  |Human|
  :HITL gate: approve ADR;

  if (ADR approved?) then (yes)
    |Claude: Diagram-Steward|
    :Обновить C4/Sequence/BPMN\n(только если изменились структуры/потоки);
  else (no)
    stop
  endif
else (no)
  ' ADR не нужен — идём дальше
endif

if (Contract / cross-team impact?) then (yes)
  |Claude: Contract-Owner|
  :Contract-first пакет:\n- draft схем/DTO/endpoint\n- версия/совместимость\n- примеры запрос/ответ\n- integration notes;

  |Human|
  :HITL gate: approve contract change;

  if (Contract approved?) then (yes)
  else (no)
    stop
  endif
else (no)
  ' контракт не трогаем
endif

|Claude: Plan-Generator|
:Сделать Milestone-plan + breakdown:\nsmall batches, зависимости, DoD,\nсписок проверок/таргетов;

|Claude: Dev-Prompt-Engineer|
:Собрать Dev Prompt Pack:\n(1) Codex PLAN prompt (read-only)\n(2) Codex APPLY prompt\n+ Anchor-блок (non-negotiables)\n+ список файлов/проверок/ограничений;

|Codex: PLAN (read-only)|
:PLAN: только планирование:\n- шаги\n- файлы\n- риски/assumptions\n- критерии готовности (DoD);

|Human|
:Review PLAN (scope/risk/DoD/artefacts sync);

if (PLAN approved?) then (yes)
  |Codex: APPLY|
  :APPLY: реализовать по PLAN:\nкод + тесты + docs-as-code;\nобновить CODEX.md/AGENTS.md\nесли правила/потоки менялись;

  |CI / Local Checks|
  :Запустить проверки:\nunit/integration/lint/contract-validate;

  |Claude: Compliance-Reviewer|
  :Сверить реализацию с source-of-truth:\nADR/MVP/Contracts/Diagrams;\nпроверить синхрон docs/diagrams;\nвыявить scope creep;

  if (Все гейты зелёные?) then (yes)
    |Human|
    :Merge/Release (small batch);\nзафиксировать changelog/next step;
    stop
  else (no)
    |Claude: Compliance-Reviewer|
    :Сформировать Findings + Fix Plan;\n(при необходимости) Fix Prompt Pack;

    |Codex: APPLY|
    :APPLY fixes (small batch);

    |CI / Local Checks|
    :Re-run checks;

    |Claude: Compliance-Reviewer|
    :Re-review;

    |Human|
    :Merge/Release;
    stop
  endif

else (no)
  |Claude: Dev-Prompt-Engineer|
  :Уточнить PLAN/APPLY промпты\nи ограничения по замечаниям;

  |Codex: PLAN (read-only)|
  :PLAN повторно;

  |Human|
  :Review повторно;
  stop
endif

@enduml
