name: Deploy UAT

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-uat
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Build images and deploy UAT
    runs-on: ubuntu-latest
    environment: uat
    env:
      DEPLOY_ENV: uat
      DEPLOY_HOST: ${{ secrets.UAT_HOST }}
      DEPLOY_USER: ${{ secrets.UAT_USER }}
      DEPLOY_PATH: ${{ secrets.UAT_DEPLOY_PATH || '/opt/hometusk' }}
      ENV_FILE_CONTENT: ${{ secrets.UAT_ENV_FILE }}
      GHCR_USERNAME: ${{ github.actor }}
      GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN || github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image names
        run: |
          owner_lc="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "BACKEND_IMAGE=ghcr.io/${owner_lc}/hometusk-backend" >> "$GITHUB_ENV"
          echo "WEB_IMAGE=ghcr.io/${owner_lc}/hometusk-web" >> "$GITHUB_ENV"
          echo "KEYCLOAK_IMAGE_REPOSITORY=ghcr.io/${owner_lc}/hometusk-keycloak" >> "$GITHUB_ENV"
          echo "KEYCLOAK_IMAGE=ghcr.io/${owner_lc}/hometusk-keycloak:sha-${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=sha-${GITHUB_SHA}" >> "$GITHUB_ENV"
          echo "LATEST_TAG=main-latest" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: services/backend
          file: services/backend/docker/Dockerfile
          push: true
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.BACKEND_IMAGE }}:${{ env.LATEST_TAG }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: infra/uat/nginx/Dockerfile
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.WEB_IMAGE }}:${{ env.LATEST_TAG }}
          build-args: |
            VITE_API_BASE_URL=/api/v1
            VITE_AUTH_PROVIDER=keycloak
            VITE_OIDC_AUTHORITY=${{ secrets.UAT_OIDC_AUTHORITY }}
            VITE_OIDC_CLIENT_ID=hometusk-web
            VITE_OIDC_REDIRECT_URI=${{ secrets.UAT_OIDC_REDIRECT_URI }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

      - name: Build and push Keycloak image
        uses: docker/build-push-action@v6
        with:
          context: infra/keycloak
          file: infra/keycloak/Dockerfile
          push: true
          tags: |
            ${{ env.KEYCLOAK_IMAGE }}
            ${{ env.KEYCLOAK_IMAGE_REPOSITORY }}:${{ env.LATEST_TAG }}
          cache-from: type=gha,scope=keycloak
          cache-to: type=gha,mode=max,scope=keycloak

      - name: Configure SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.UAT_SSH_KEY }}

      - name: Trust remote host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        run: bash scripts/deploy/compose-deploy.sh
