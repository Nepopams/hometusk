name: Deploy Prod

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Immutable image tag to deploy, for example sha-<commit_sha>
        required: true
        type: string
      confirm_environment:
        description: Type prod to confirm production deployment
        required: true
        type: string

permissions:
  contents: read
  packages: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy existing images to prod
    runs-on: ubuntu-latest
    environment: prod
    if: ${{ inputs.confirm_environment == 'prod' }}
    env:
      DEPLOY_ENV: prod
      DEPLOY_HOST: ${{ secrets.PROD_HOST }}
      DEPLOY_USER: ${{ secrets.PROD_USER }}
      DEPLOY_PATH: ${{ secrets.PROD_DEPLOY_PATH || '/opt/hometusk' }}
      ENV_FILE_CONTENT: ${{ secrets.PROD_ENV_FILE }}
      IMAGE_TAG: ${{ inputs.image_tag }}
      GHCR_USERNAME: ${{ github.actor }}
      GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN || github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute image names
        run: |
          owner_lc="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          echo "BACKEND_IMAGE=ghcr.io/${owner_lc}/hometusk-backend" >> "$GITHUB_ENV"
          echo "WEB_IMAGE=ghcr.io/${owner_lc}/hometusk-web" >> "$GITHUB_ENV"
          echo "KEYCLOAK_IMAGE=ghcr.io/${owner_lc}/hometusk-keycloak:${IMAGE_TAG}" >> "$GITHUB_ENV"

      - name: Configure SSH
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_KEY }}

      - name: Trust remote host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        run: bash scripts/deploy/compose-deploy.sh
