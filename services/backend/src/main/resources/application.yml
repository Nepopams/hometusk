spring:
  application:
    name: hometusk-backend

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hometusk}
    username: ${SPRING_DATASOURCE_USERNAME:hometusk}
    password: ${SPRING_DATASOURCE_PASSWORD:hometusk_pass_change_me}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${SPRING_MAIL_HOST:localhost}
    port: ${SPRING_MAIL_PORT:1025}
    username: ${SPRING_MAIL_USERNAME:}
    password: ${SPRING_MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${SPRING_MAIL_SMTP_AUTH:false}
          starttls:
            enable: ${SPRING_MAIL_SMTP_STARTTLS_ENABLE:false}

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI:http://localhost:8180/realms/hometusk}
          jwk-set-uri: ${SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI:http://localhost:8180/realms/hometusk/protocol/openid-connect/certs}

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false

server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

hometusk:
  cookie:
    secure: false
    same-site: Lax
  cors:
    allowed-origins: http://localhost:5173,http://127.0.0.1:5173
  auth:
    keycloak:
      base-url: ${HOMETUSK_AUTH_KEYCLOAK_BASE_URL:http://localhost:8180}
      realm: ${HOMETUSK_AUTH_KEYCLOAK_REALM:hometusk}
      user-client-id: ${HOMETUSK_AUTH_KEYCLOAK_USER_CLIENT_ID:hometusk-api}
      admin-client-id: ${HOMETUSK_AUTH_KEYCLOAK_ADMIN_CLIENT_ID:hometusk-backend}
      admin-client-secret: ${HOMETUSK_AUTH_KEYCLOAK_ADMIN_CLIENT_SECRET:hometusk-backend-secret}
      connect-timeout-ms: ${HOMETUSK_AUTH_KEYCLOAK_CONNECT_TIMEOUT_MS:3000}
      read-timeout-ms: ${HOMETUSK_AUTH_KEYCLOAK_READ_TIMEOUT_MS:5000}
  scheduler:
    enabled: false
    fixed-rate-ms: 3600000
  command-scheduler:
    enabled: false
    fixed-rate-ms: 60000
    batch-size: 50
  email:
    enabled: ${HOMETUSK_EMAIL_ENABLED:false}
    sender: ${HOMETUSK_EMAIL_SENDER:log}
    from: ${HOMETUSK_EMAIL_FROM:noreply@hometusk.local}
    fixed-rate-ms: ${HOMETUSK_EMAIL_FIXED_RATE_MS:60000}
    batch-size: ${HOMETUSK_EMAIL_BATCH_SIZE:25}
    max-attempts: ${HOMETUSK_EMAIL_MAX_ATTEMPTS:3}
    retry-delay-ms: ${HOMETUSK_EMAIL_RETRY_DELAY_MS:60000}
    task-assignment:
      enabled: ${HOMETUSK_EMAIL_TASK_ASSIGNMENT_ENABLED:true}
      skip-self-notifications: ${HOMETUSK_EMAIL_TASK_ASSIGNMENT_SKIP_SELF:true}
      app-base-url: ${HOMETUSK_WEB_BASE_URL:http://localhost:5173}
      task-path-template: /households/{householdId}/tasks/{taskId}
  marketplaces:
    templates:
      - id: ozon
        name: Ozon
        url-template: "https://www.ozon.ru/search/?text={query}"
        icon-url: /icons/ozon.svg
        enabled: true
      - id: yandex_market
        name: Yandex Market
        url-template: "https://market.yandex.ru/search?text={query}"
        icon-url: /icons/yandex-market.svg
        enabled: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when_authorized
    prometheus:
      enabled: true

logging:
  level:
    root: INFO
    com.hometusk: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

# Decision Provider Configuration (Stage 2)
decision:
  provider: ${DECISION_PROVIDER:manual}  # Options: manual, aiplatform
  fallback:
    enabled: ${DECISION_FALLBACK_ENABLED:true}  # Use manual as fallback when aiplatform unavailable

# AI Platform Configuration (used when decision.provider=aiplatform)
# Endpoint: /decision (HomeTusk legacy) or /decide (upstream canonical)
# See: docs/integration/ai-platform/v1/mapping/hometusk-to-upstream.md
aiplatform:
  base-url: ${AI_PLATFORM_URL:http://localhost:8090}
  decision-path: ${AI_PLATFORM_DECISION_PATH:/decision}  # /decision (default) or /decide (upstream)
  timeout-ms: ${AI_PLATFORM_TIMEOUT_MS:5000}
  api-key: ${AI_PLATFORM_API_KEY:}
  resilience:
    retry:
      max-attempts: 2
      initial-interval-ms: 200
      backoff-multiplier: 2.0
      jitter-factor: 0.5
    circuit-breaker:
      sliding-window-size: 10
      minimum-number-of-calls: 5
      failure-rate-threshold: 50
      wait-duration-in-open-state-ms: 30000
      permitted-calls-in-half-open-state: 2

# ASR Service Configuration
asr:
  base-url: ${ASR_SERVICE_URL:http://localhost:8000/api/v1/asr}
  api-key: ${ASR_API_KEY:}
  connect-timeout-ms: 5000
  read-timeout-ms: 30000
  resilience:
    retry:
      max-attempts: 2
      wait-duration-ms: 500
      backoff-multiplier: 2.0
  guardrails:
    max-size-bytes: 10485760
    allowed-formats:
      - audio/ogg
      - audio/mpeg
      - audio/wav
      - audio/mp4
      - audio/webm
  rate-limit:
    post-requests-per-minute: 5
    get-requests-per-minute: 30

# Guardrails Configuration (Stage 3+)
guardrails:
  enabled: ${GUARDRAILS_ENABLED:true}
  max-open-tasks-per-assignee: ${GUARDRAILS_MAX_OPEN_TASKS:10}
  max-deadline-days: ${GUARDRAILS_MAX_DEADLINE_DAYS:365}
  # Availability checking (Stage 5 feature, OFF by default in Stage 4)
  availability-enabled: ${GUARDRAILS_AVAILABILITY_ENABLED:false}
  quiet-hours-start: ${GUARDRAILS_QUIET_HOURS_START:22:00}
  quiet-hours-end: ${GUARDRAILS_QUIET_HOURS_END:07:00}
