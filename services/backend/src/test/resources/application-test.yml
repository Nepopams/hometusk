# Test configuration
spring:
  datasource:
    # Will be overridden by Testcontainers
    url: jdbc:postgresql://localhost:5432/hometusk_test
    username: test
    password: test

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

  security:
    oauth2:
      resourceserver:
        jwt:
          # Disabled for tests - using mock JWT
          issuer-uri: http://localhost:8180/realms/test

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    prometheus:
      enabled: true

logging:
  level:
    com.hometusk: DEBUG
    org.springframework.security: DEBUG
    org.testcontainers: INFO
