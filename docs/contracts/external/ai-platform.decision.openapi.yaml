openapi: 3.1.0
info:
  title: AI Platform Decision API
  version: 1.0.0
  description: |
    External AI Platform contract consumed by HomeTusk for command decisions.
    Upstream schemas remain the source of truth under
    docs/integration/ai-platform/v1/upstream/.

servers:
  - url: "{baseUrl}"
    description: AI Platform server
    variables:
      baseUrl:
        default: http://localhost:8090
        description: AI Platform base URL

paths:
  /v1/decide:
    post:
      operationId: requestDecision
      summary: Request an AI decision for a natural-language command
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DecisionRequest"
      responses:
        "200":
          description: Decision made
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DecisionResponse"
        "400":
          description: Invalid request
        "500":
          description: AI Platform internal error
        "503":
          description: AI service temporarily unavailable

  /health:
    get:
      operationId: healthCheck
      summary: Health check for AI Platform
      responses:
        "200":
          description: Service is healthy
        "503":
          description: Service is unhealthy

components:
  schemas:
    DecisionRequest:
      type: object
      required: [command_id, user_id, timestamp, text, capabilities, context]
      additionalProperties: false
      properties:
        command_id:
          type: string
        user_id:
          type: string
        timestamp:
          type: string
          format: date-time
        text:
          type: string
        capabilities:
          type: array
          minItems: 1
          items:
            type: string
            enum: [start_job, propose_create_task, propose_add_shopping_item, clarify]
        context:
          $ref: "#/components/schemas/DecisionContext"

    DecisionContext:
      type: object
      required: [household]
      additionalProperties: false
      properties:
        household:
          type: object
          required: [members]
          additionalProperties: false
          properties:
            household_id:
              type: string
            members:
              type: array
              minItems: 1
              items:
                type: object
                required: [user_id]
                additionalProperties: false
                properties:
                  user_id:
                    type: string
                  display_name:
                    type: string
                  role:
                    type: string
                  workload_score:
                    type: number
            zones:
              type: array
              items:
                type: object
                required: [zone_id, name]
                additionalProperties: false
                properties:
                  zone_id:
                    type: string
                  name:
                    type: string
            shopping_lists:
              type: array
              items:
                type: object
                required: [list_id, name]
                additionalProperties: false
                properties:
                  list_id:
                    type: string
                  name:
                    type: string

    DecisionResponse:
      type: object
      required:
        - decision_id
        - command_id
        - status
        - action
        - confidence
        - payload
        - explanation
        - trace_id
        - schema_version
        - decision_version
        - created_at
      additionalProperties: false
      properties:
        decision_id:
          type: string
        command_id:
          type: string
        status:
          type: string
          enum: [ok, clarify, error]
        action:
          type: string
          enum: [start_job, propose_create_task, propose_add_shopping_item, clarify]
        confidence:
          type: number
          minimum: 0
          maximum: 1
        payload:
          type: object
        explanation:
          type: string
        trace_id:
          type: string
        schema_version:
          type: string
        decision_version:
          type: string
        created_at:
          type: string
          format: date-time
