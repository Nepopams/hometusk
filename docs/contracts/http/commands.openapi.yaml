openapi: 3.1.0
info:
  title: HomeTusk Commands API
  version: 1.0.0
  description: |
    Intent-driven API for household task management.
    Users submit commands, not CRUD operations.

    **Stage 1:** Structured commands (no NL processing yet).

    **INIT-2026Q3-shopping-categories compatibility delta:** shopping item
    category/source fields are optional and backward-compatible. Existing
    clients may omit them; existing items may return `null`.

    **INIT-2026Q3-command-attributes compatibility delta:** create_task
    commands may include optional command-level `dueDate`, `assigneeId`, and
    `zoneId`. These fields are backward-compatible; existing clients may keep
    sending task attributes only inside `payload`.

    **INIT-2026Q2-email-validation compatibility delta:** user profiles expose
    durable email verification state and notification eligibility. The new
    fields are additive and backward-compatible.

    **INIT-2026Q3-native-mobile-mvp ST-3502 compatibility delta:** native
    mobile clients may use `/auth/mobile/*` endpoints to receive Keycloak
    access/refresh tokens as JSON for platform secure storage. Existing browser
    cookie auth endpoints are unchanged.
    **INIT-2026Q3-voice-command-chat-mvp compatibility delta:** voice-originated
    commands may use `source=voice` and optional `asrTraceId` returned by
    `POST /api/v1/voice/transcriptions`. ASR only creates an editable draft;
    command execution still requires an explicit `POST /api/v1/commands`.

    See also:
    - [CLAUDE.md](../../../CLAUDE.md) — Development rules
    - [ADR-003](../../architecture/decisions/003-stage1-commands-api.md) — Stage 1 decisions

servers:
  - url: /api/v1
    description: API version 1

security:
  - bearerAuth: []

tags:
  - name: Commands
    description: Command execution endpoints
  - name: Auth
    description: Authentication endpoints
  - name: Users
    description: User profile endpoints
  - name: Households
    description: Household data endpoints
  - name: Analytics
    description: Household analytics endpoints
  - name: Gamification
    description: Gamification progress and badges
  - name: Invites
    description: Household invite endpoints
  - name: Notifications
    description: In-app notification endpoints
  - name: Shopping
    description: Shopping list management endpoints

paths:
  /commands:
    post:
      operationId: executeCommand
      summary: Execute a household command
      description: |
        Processes a command and returns the execution result.
        Commands are first-class entities with their own lifecycle.

        **Supported command types:**
        - `create_task` — Create a new task
        - `complete_task` — Mark a task as done

        **Traceability:**
        - Provide `X-Correlation-ID` header for distributed tracing
        - Server generates one if not provided
        - All logs and database records include this ID
      tags:
        - Commands
      parameters:
        - name: X-Correlation-ID
          in: header
          required: false
          description: Client-provided correlation ID for distributed tracing
          schema:
            type: string
            format: uuid
        - name: Idempotency-Key
          in: header
          required: false
          description: |
            Idempotency key for safe retries. Unique per user for 24 hours.
            Reuse with a different payload returns 409 IDEMPOTENCY_CONFLICT.
          schema:
            type: string
            minLength: 1
            maxLength: 128
            pattern: '^[A-Za-z0-9._-]{1,128}$'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CommandRequest'
            examples:
              createTask:
                summary: Create a task
                value:
                  householdId: "123e4567-e89b-12d3-a456-426614174000"
                  type: "create_task"
                  payload:
                    title: "Clean the kitchen"
                    zoneId: "123e4567-e89b-12d3-a456-426614174001"
                    deadline: "2027-01-13T18:00:00Z"
                  source: "web"
              createTaskWithCommandAttributes:
                summary: Create a task with command-level attributes
                value:
                  householdId: "123e4567-e89b-12d3-a456-426614174000"
                  type: "create_task"
                  payload:
                    title: "Clean the kitchen"
                  dueDate: "2027-01-13T18:00:00Z"
                  assigneeId: "123e4567-e89b-12d3-a456-426614174002"
                  zoneId: "123e4567-e89b-12d3-a456-426614174001"
                  source: "web"
              scheduleTask:
                summary: Schedule a task command for later execution
                value:
                  householdId: "123e4567-e89b-12d3-a456-426614174000"
                  type: "create_task"
                  payload:
                    title: "Clean the kitchen"
                  scheduleAt: "2027-01-13T16:00:00Z"
                  dueDate: "2027-01-13T18:00:00Z"
                  assigneeId: "123e4567-e89b-12d3-a456-426614174002"
                  zoneId: "123e4567-e89b-12d3-a456-426614174001"
                  source: "web"
              completeTask:
                summary: Complete a task
                value:
                  householdId: "123e4567-e89b-12d3-a456-426614174000"
                  type: "complete_task"
                  payload:
                    taskId: "123e4567-e89b-12d3-a456-426614174002"
                  source: "mobile"
      responses:
        '200':
          description: Command processed (status in response body)
          headers:
            X-Correlation-ID:
              schema:
                type: string
                format: uuid
              description: Correlation ID for this request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandResponse'
        '400':
          description: Invalid request (schema/validation/type errors)
          headers:
            X-Correlation-ID:
              schema:
                type: string
                format: uuid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandErrorResponse'
        '401':
          description: Authentication required or token invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '403':
          description: User does not have access to this household
          headers:
            X-Correlation-ID:
              schema:
                type: string
                format: uuid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandErrorResponse'
        '409':
          description: Idempotency conflict (key reuse with different payload or in-progress)
          headers:
            X-Correlation-ID:
              schema:
                type: string
                format: uuid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandErrorResponse'

  /commands/{commandId}/continue:
    post:
      operationId: continueCommand
      summary: Continue a command awaiting input
      tags:
        - Commands
      parameters:
        - name: commandId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: X-Correlation-ID
          in: header
          required: false
          description: Client-provided correlation ID for distributed tracing
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ContinueCommandRequest'
      responses:
        '200':
          description: Command processed (status in response body)
          headers:
            X-Correlation-ID:
              schema:
                type: string
                format: uuid
              description: Correlation ID for this request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandResponse'
        '400':
          description: Command cannot be continued in current state
          headers:
            X-Correlation-ID:
              schema:
                type: string
                format: uuid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandErrorResponse'
        '401':
          description: Authentication required or token invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '403':
          description: Access denied for this command
          headers:
            X-Correlation-ID:
              schema:
                type: string
                format: uuid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandErrorResponse'
        '404':
          description: Command not found
          headers:
            X-Correlation-ID:
              schema:
                type: string
                format: uuid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandErrorResponse'

  /auth/login:
    post:
      operationId: loginWithPassword
      summary: Login with email and password
      description: |
        Authenticates against Keycloak and sets HttpOnly access/refresh cookies.
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '204':
          description: Auth cookies set
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '503':
          description: Authentication provider unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /auth/register:
    post:
      operationId: registerWithPassword
      summary: Register with email and password
      description: |
        Creates an enabled Keycloak user, assigns the default user role, then logs the user in by setting HttpOnly cookies.
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '204':
          description: User created and auth cookies set
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '503':
          description: Authentication provider unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /auth/refresh:
    post:
      operationId: refreshAuthSession
      summary: Refresh auth cookies
      description: Uses the HttpOnly refresh cookie to renew access/refresh cookies.
      tags:
        - Auth
      security: []
      responses:
        '204':
          description: Auth cookies refreshed
        '401':
          description: Refresh required or refresh token invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '503':
          description: Authentication provider unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /auth/logout:
    post:
      operationId: logoutAuthSession
      summary: Logout and clear auth cookies
      description: Best-effort logout from Keycloak, then clears local auth cookies.
      tags:
        - Auth
      security: []
      responses:
        '204':
          description: Auth cookies cleared

  /auth/mobile/login:
    post:
      operationId: loginMobileWithPassword
      summary: Login mobile client with email and password
      description: |
        Authenticates against Keycloak and returns access/refresh tokens as JSON
        for native mobile clients. Tokens must be stored only in platform secure
        storage. Browser clients should continue to use `/auth/login`.
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Mobile auth tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileAuthResponse'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '503':
          description: Authentication provider unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /auth/mobile/register:
    post:
      operationId: registerMobileWithPassword
      summary: Register mobile user with email and password
      description: |
        Creates an enabled Keycloak user, assigns the default user role, and
        returns access/refresh tokens as JSON for native mobile secure storage.
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '200':
          description: User created and mobile auth tokens issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileAuthResponse'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '503':
          description: Authentication provider unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /auth/mobile/refresh:
    post:
      operationId: refreshMobileAuthSession
      summary: Refresh mobile auth tokens
      description: |
        Uses a refresh token from native secure storage to renew the mobile
        access/refresh token pair. Missing or invalid refresh tokens return
        `AUTH_REFRESH_REQUIRED`.
      tags:
        - Auth
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileRefreshRequest'
      responses:
        '200':
          description: Mobile auth tokens refreshed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MobileAuthResponse'
        '400':
          description: Validation failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '401':
          description: Refresh required or refresh token invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '503':
          description: Authentication provider unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /auth/mobile/logout:
    post:
      operationId: logoutMobileAuthSession
      summary: Logout mobile client
      description: |
        Best-effort logout from Keycloak using the refresh token stored in the
        native client. The mobile app must clear secure session state regardless
        of provider logout outcome.
      tags:
        - Auth
      security: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MobileLogoutRequest'
      responses:
        '204':
          description: Mobile auth session cleared

  /auth/session:
    post:
      operationId: createAuthSession
      summary: Create session cookie for SSE
      description: |
        Validates the bearer token and sets an HttpOnly session cookie for SSE connections.
      tags:
        - Auth
      responses:
        '200':
          description: Session cookie set
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /users/me:
    get:
      operationId: getCurrentUser
      summary: Get current user profile
      description: |
        Returns the current user's profile.
        If the user does not exist, creates a new profile from JWT claims.
        Email state is synchronized from normalized JWT email/email_verified
        claims when present; missing email claims do not clear existing profile
        email state.
      tags:
        - Users
      responses:
        '200':
          description: User profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'

  /households/{householdId}/tasks:
    get:
      operationId: listTasks
      summary: List tasks in a household
      tags:
        - Households
      parameters:
        - name: householdId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [open, in_progress, done, cancelled]
        - name: assigneeId
          in: query
          required: false
          schema:
            type: string
            format: uuid
        - name: zoneId
          in: query
          required: false
          description: Filter by zone
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of tasks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Task'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '403':
          description: Not a member of this household

  /households/{householdId}/tasks/{taskId}:
    get:
      operationId: getTask
      summary: Get a specific task
      tags:
        - Households
      parameters:
        - name: householdId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: taskId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Task details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskDetail'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '403':
          description: Not a member of this household
        '404':
          description: Task not found

  /households/{householdId}/members:
    get:
      operationId: listHouseholdMembers
      summary: List members of a household
      tags:
        - Households
      parameters:
        - name: householdId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of members
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/HouseholdMember'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '403':
          description: Not a member of this household

  /households/{householdId}/zones:
    get:
      operationId: listZones
      summary: List zones in a household
      tags:
        - Households
      parameters:
        - name: householdId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of zones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Zone'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '403':
          description: Not a member of this household
    post:
      operationId: createZone
      summary: Create a zone in household
      tags:
        - Households
      parameters:
        - name: householdId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateZoneRequest'
      responses:
        '201':
          description: Zone created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Zone'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '403':
          description: Not a member of this household

  /households/{householdId}/invites:
    post:
      operationId: createHouseholdInvite
      summary: Create a household invite
      tags:
        - Invites
      parameters:
        - name: householdId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '201':
          description: Invite created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateInviteResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '403':
          description: Not a member of this household
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandErrorResponse'

  /invites/accept:
    post:
      operationId: acceptHouseholdInvite
      summary: Accept a household invite
      tags:
        - Invites
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AcceptInviteRequest'
      responses:
        '200':
          description: Invite accepted or no-op for existing member
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AcceptInviteResponse'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '404':
          description: Invalid invite token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandErrorResponse'
        '410':
          description: Invite expired, redeemed, or revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandErrorResponse'

  /households/{householdId}/notifications:
    get:
      operationId: listNotifications
      summary: List notifications for a household
      description: Returns notifications for the current user within the household.
      tags:
        - Notifications
      parameters:
        - name: householdId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: since
          in: query
          required: false
          description: RFC3339 timestamp to filter notifications since this time
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          description: Max number of results (default 50, max 200)
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
      responses:
        '200':
          description: List of notifications
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Notification'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '403':
          description: Not a member of this household
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandErrorResponse'

  /households/{householdId}/notifications/stream:
    get:
      operationId: streamNotifications
      summary: Stream notifications for a household
      description: Opens an SSE stream for real-time notifications.
      tags:
        - Notifications
      parameters:
        - name: householdId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: SSE stream opened
          content:
            text/event-stream:
              schema:
                type: string
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '403':
          description: Not a member of this household
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandErrorResponse'

  /households/{householdId}/analytics:
    get:
      operationId: getAnalytics
      summary: Get household analytics summary
      tags:
        - Analytics
      parameters:
        - name: householdId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: period
          in: query
          required: false
          description: Time period for analytics (7d or 30d)
          schema:
            type: string
            enum: [7d, 30d]
            default: 7d
      responses:
        '200':
          description: Analytics summary
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AnalyticsSummary'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '403':
          description: Not a member of this household
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandErrorResponse'

  /households/{householdId}/gamification/progress:
    get:
      operationId: getGamificationProgress
      summary: Get gamification progress
      tags:
        - Gamification
      parameters:
        - name: householdId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Gamification progress
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GamificationProgressResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '403':
          description: Not a member of this household
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandErrorResponse'

  /households/{householdId}/gamification/badges:
    get:
      operationId: getGamificationBadges
      summary: Get badge catalog
      tags:
        - Gamification
      parameters:
        - name: householdId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Badge catalog
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BadgeCatalogResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '403':
          description: Not a member of this household
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandErrorResponse'

  /notifications/{notificationId}/read:
    post:
      operationId: markNotificationRead
      summary: Mark notification as read
      tags:
        - Notifications
      parameters:
        - name: notificationId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Notification updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notification'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '404':
          description: Notification not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandErrorResponse'

  /households:
    post:
      operationId: createHouseholdPublic
      summary: Create a new household
      description: |
        Creates a new household and automatically adds the current user as admin.
        This is the user-facing endpoint for household creation.
      tags:
        - Households
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateHouseholdRequest'
      responses:
        '201':
          description: Household created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Household'
        '400':
          description: Invalid request (name validation failed)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandErrorResponse'
        '401':
          description: Authentication required

  /households/{householdId}/shopping-lists:
    get:
      operationId: listShoppingLists
      summary: List shopping lists in a household
      tags:
        - Shopping
      parameters:
        - name: householdId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: List of shopping lists
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ShoppingList'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '403':
          description: Not a member of this household
    post:
      operationId: createShoppingList
      summary: Create a shopping list
      description: |
        Creates a user-visible shopping list container. Duplicate names are
        allowed for MVP; the server trims leading/trailing whitespace.
      tags:
        - Shopping
      parameters:
        - name: householdId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateShoppingListRequest'
            examples:
              createGroceries:
                summary: Create groceries list
                value:
                  name: "Groceries"
      responses:
        '201':
          description: Shopping list created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShoppingList'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '403':
          description: Not a member of this household

  /households/{householdId}/shopping-lists/{listId}/items:
    get:
      operationId: listShoppingItems
      summary: List items in a shopping list
      description: |
        Returns items in the shopping list. Filters are optional and
        composable; omitted category/source fields match all items, including
        uncategorised legacy items.
      tags:
        - Shopping
      parameters:
        - name: householdId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: listId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: purchased
          in: query
          required: false
          description: Filter by purchase status
          schema:
            type: boolean
        - name: category
          in: query
          required: false
          description: Filter by shopping category
          schema:
            $ref: '#/components/schemas/ShoppingItemCategory'
        - name: source
          in: query
          required: false
          description: Filter by source/store name, exact match after server-side trim
          schema:
            type: string
            minLength: 1
            maxLength: 120
      responses:
        '200':
          description: List of shopping items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/ShoppingItem'
              examples:
                categorisedItems:
                  summary: Items with category and source
                  value:
                    - id: "8e2dcf88-c0d0-41a2-8a4a-5db45f3b34d2"
                      name: "Milk"
                      quantity: 2
                      unit: "liters"
                      category: "groceries"
                      source: "Perekrestok"
                      purchased: false
                      linkedTaskId: null
                      createdAt: "2026-06-13T10:00:00Z"
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '403':
          description: Not a member of this household
        '404':
          description: Shopping list not found
    post:
      operationId: addShoppingItem
      summary: Add an item to a shopping list
      description: |
        Adds a new item to the shopping list. This is a direct REST endpoint
        for simple form submissions (not via commands API).
        See ADR-009 for the Commands vs CRUD boundary decision.
      tags:
        - Shopping
      parameters:
        - name: householdId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: listId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AddShoppingItemRequest'
            examples:
              categorisedItem:
                summary: Add an item with category and source
                value:
                  name: "Milk"
                  quantity: 2
                  unit: "liters"
                  category: "groceries"
                  source: "Perekrestok"
                  linkedTaskId: "78dfc7d5-4a67-4579-8648-97e2f5dcb18f"
      responses:
        '201':
          description: Item created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShoppingItem'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommandErrorResponse'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '403':
          description: Not a member of this household
        '404':
          description: Shopping list or linked task not found

  /households/{householdId}/shopping-items/{itemId}:
    patch:
      operationId: updateShoppingItem
      summary: Update a shopping item
      description: |
        Partially updates a shopping item. At least one mutable field must be
        present. `purchased` remains supported for mark purchased/unpurchased;
        category/source can be changed independently without altering purchase
        state. Omitted `linkedTaskId` keeps the current task link, while
        explicit `linkedTaskId: null` unlinks the item.
      tags:
        - Shopping
      parameters:
        - name: householdId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateShoppingItemRequest'
            examples:
              markPurchased:
                summary: Mark an item purchased
                value:
                  purchased: true
              updateCategoryAndSource:
                summary: Move an item to another category/source
                value:
                  category: "cleaning"
                  source: "Ozon"
              linkToTask:
                summary: Link an item to a task
                value:
                  linkedTaskId: "78dfc7d5-4a67-4579-8648-97e2f5dcb18f"
              unlinkTask:
                summary: Unlink an item from any task
                value:
                  linkedTaskId: null
      responses:
        '200':
          description: Item updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShoppingItem'
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '403':
          description: Not a member of this household
        '404':
          description: Item or linked task not found
    delete:
      operationId: deleteShoppingItem
      summary: Delete a shopping item
      tags:
        - Shopping
      parameters:
        - name: householdId
          in: path
          required: true
          schema:
            type: string
            format: uuid
        - name: itemId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '204':
          description: Item deleted
        '401':
          description: Authentication required
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthErrorResponse'
        '403':
          description: Not a member of this household
        '404':
          description: Item not found

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Keycloak JWT token

  schemas:
    LoginRequest:
      type: object
      required:
        - email
        - password
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 1

    RegisterRequest:
      type: object
      required:
        - email
        - password
      properties:
        name:
          type: string
          maxLength: 120
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    MobileAuthResponse:
      type: object
      required:
        - accessToken
        - refreshToken
        - expiresInSeconds
        - refreshExpiresInSeconds
        - tokenType
      properties:
        accessToken:
          type: string
          description: Keycloak access token. Native clients must store it only in platform secure storage.
        refreshToken:
          type: string
          description: Keycloak refresh token. Native clients must store it only in platform secure storage.
        expiresInSeconds:
          type: integer
          format: int64
          minimum: 0
        refreshExpiresInSeconds:
          type: integer
          format: int64
          minimum: 0
        tokenType:
          type: string
          enum: [Bearer]

    MobileRefreshRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          minLength: 1
          description: Refresh token previously returned by `/auth/mobile/login`, `/auth/mobile/register`, or `/auth/mobile/refresh`.

    MobileLogoutRequest:
      type: object
      properties:
        refreshToken:
          type:
            - string
            - 'null'
          description: Optional refresh token to revoke at Keycloak before local secure storage is cleared.

    # Command Request/Response
    CommandRequest:
      type: object
      required:
        - householdId
        - type
        - payload
        - source
      properties:
        householdId:
          type: string
          format: uuid
          description: Target household for this command
        type:
          type: string
          enum:
            - create_task
            - complete_task
          description: Command type to execute
        payload:
          oneOf:
            - $ref: '#/components/schemas/CreateTaskPayload'
            - $ref: '#/components/schemas/CompleteTaskPayload'
          description: Command-specific payload
        dueDate:
          type: string
          format: date-time
          description: |
            Optional command-level due date for `create_task`; maps to task
            `deadline`. If both `dueDate` and `payload.deadline` are present,
            they must represent the same instant or the request is rejected with
            `BUSINESS_RULE_VIOLATION` / `COMMAND_ATTRIBUTE_CONFLICT`.
        assigneeId:
          type: string
          format: uuid
          description: |
            Optional command-level assignee for `create_task`; must be a member
            of the target household. If both this field and
            `payload.assigneeId` are present, they must match.
        zoneId:
          type: string
          format: uuid
          description: |
            Optional command-level zone for `create_task`; must exist in the
            target household. If both this field and `payload.zoneId` are
            present, they must match.
        scheduleAt:
          type: string
          format: date-time
          description: |
            Optional one-off command execution time. When present, HomeTusk
            validates the effective command payload at submission time, stores
            the command with status `scheduled`, creates no task immediately,
            and revalidates domain invariants before executing at due time.
            Must be in the future.
        source:
          type: string
          enum:
            - api
            - web
            - mobile
            - voice
          description: |
            Origin of the command. `voice` means the user explicitly submitted
            an editable ASR transcript draft; ASR never auto-executes commands.
        asrTraceId:
          type: string
          maxLength: 128
          description: |
            Optional trace id returned by `POST /api/v1/voice/transcriptions`.
            Only used for audit linkage when `source=voice`; clients that do not
            use voice omit this field.
        clientTimestamp:
          type: string
          format: date-time
          description: Client-side timestamp (ISO 8601)

    ContinueCommandRequest:
      type: object
      required:
        - additionalInput
      properties:
        additionalInput:
          type: object
          additionalProperties: true
          description: Additional input to merge with original command payload

    CreateTaskPayload:
      type: object
      required:
        - title
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 500
          description: Task title
        description:
          type: string
          maxLength: 2000
          description: Task description
        zoneId:
          type: string
          format: uuid
          description: Zone/location for the task (must exist in household)
        assigneeId:
          type: string
          format: uuid
          description: Explicit assignee (must be household member)
        deadline:
          type: string
          format: date-time
          description: Deadline (must be in the future)

    CompleteTaskPayload:
      type: object
      required:
        - taskId
      properties:
        taskId:
          type: string
          format: uuid
          description: ID of task to complete (must exist in household)

    CommandResponse:
      oneOf:
        - $ref: '#/components/schemas/CommandExecutedResponse'
        - $ref: '#/components/schemas/CommandScheduledResponse'
        - $ref: '#/components/schemas/CommandNeedsInputResponse'
        - $ref: '#/components/schemas/CommandRejectedResponse'
        - $ref: '#/components/schemas/CommandDegradedResponse'
      discriminator:
        propertyName: status
        mapping:
          executed: '#/components/schemas/CommandExecutedResponse'
          scheduled: '#/components/schemas/CommandScheduledResponse'
          needs_input: '#/components/schemas/CommandNeedsInputResponse'
          rejected: '#/components/schemas/CommandRejectedResponse'
          executed_degraded: '#/components/schemas/CommandDegradedResponse'

    CommandExecutedResponse:
      type: object
      required:
        - commandId
        - correlationId
        - status
        - result
        - executionMs
        - initiatorId
      properties:
        commandId:
          type: string
          format: uuid
          description: Unique ID of the created command
        correlationId:
          type: string
          format: uuid
          description: Correlation ID for tracing
        status:
          type: string
          enum:
            - executed
          description: Command executed successfully
        result:
          $ref: '#/components/schemas/CommandResult'
        executionMs:
          type: integer
          minimum: 0
          description: Server-side execution time in milliseconds
        initiatorId:
          type: string
          format: uuid
          description: User who initiated this command (from JWT)

    CommandScheduledResponse:
      type: object
      required:
        - commandId
        - correlationId
        - status
        - scheduleAt
        - executionMs
        - initiatorId
      properties:
        commandId:
          type: string
          format: uuid
          description: Unique ID of the scheduled command
        correlationId:
          type: string
          format: uuid
          description: Correlation ID for tracing the scheduling request
        status:
          type: string
          enum:
            - scheduled
          description: Command accepted for later execution
        scheduleAt:
          type: string
          format: date-time
          description: Time when the scheduler may execute this command
        executionMs:
          type: integer
          minimum: 0
          description: Server-side scheduling time in milliseconds
        initiatorId:
          type: string
          format: uuid
          description: User who initiated this command (from JWT)

    CommandNeedsInputResponse:
      type: object
      required:
        - commandId
        - correlationId
        - status
        - question
        - requiredFields
        - executionMs
        - initiatorId
      properties:
        commandId:
          type: string
          format: uuid
        correlationId:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - needs_input
        question:
          type: string
          description: Question to ask the user
        requiredFields:
          type: array
          items:
            type: string
          description: Fields that need user input
        suggestions:
          type: object
          additionalProperties: true
          description: Suggested values for fields
        policyName:
          type: string
          description: Guardrail policy that requested clarification
        executionMs:
          type: integer
          minimum: 0
        initiatorId:
          type: string
          format: uuid

    CommandRejectedResponse:
      type: object
      required:
        - commandId
        - correlationId
        - status
        - errorCode
        - reason
        - executionMs
        - initiatorId
      properties:
        commandId:
          type: string
          format: uuid
        correlationId:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - rejected
        errorCode:
          type: string
          description: Machine-readable rejection code
        reason:
          type: string
          description: Human-readable rejection reason
        executionMs:
          type: integer
          minimum: 0
        initiatorId:
          type: string
          format: uuid

    CommandDegradedResponse:
      type: object
      required:
        - commandId
        - correlationId
        - status
        - result
        - executionMs
        - initiatorId
        - degradedReason
      properties:
        commandId:
          type: string
          format: uuid
        correlationId:
          type: string
          format: uuid
        status:
          type: string
          enum:
            - executed_degraded
        result:
          $ref: '#/components/schemas/CommandResult'
        executionMs:
          type: integer
          minimum: 0
        initiatorId:
          type: string
          format: uuid
        degradedReason:
          type: string
          enum:
            - ai_unavailable
            - ai_timeout
            - ai_low_confidence
          description: Why degraded mode was used
        fallbackStrategy:
          type: string
          description: Description of fallback applied

    CommandResult:
      type: object
      properties:
        taskId:
          type: string
          format: uuid
          description: ID of created/affected task
        assigneeId:
          type: string
          format: uuid
          description: ID of assigned user
        decisionConfidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Decision confidence (1.0 for rule-based in Stage 1)

    CommandErrorResponse:
      type: object
      required:
        - correlationId
        - errorCode
        - message
      properties:
        correlationId:
          type: string
          format: uuid
        errorCode:
          type: string
          description: Machine-readable error code (see ErrorCode enum)
        message:
          type: string
          description: Human-readable error message
        validationErrors:
          type: array
          description: Present when errorCode is SCHEMA_INVALID
          items:
            $ref: '#/components/schemas/ValidationError'
        violations:
          type: array
          description: Present when errorCode is BUSINESS_RULE_VIOLATION
          items:
            $ref: '#/components/schemas/BusinessViolation'

    ValidationError:
      type: object
      required:
        - path
        - code
        - message
      properties:
        path:
          type: string
          description: JSON path to invalid field (e.g., $.payload.deadline)
        code:
          type: string
          description: Validation error code
        message:
          type: string
          description: Human-readable validation message

    BusinessViolation:
      type: object
      required:
        - rule
        - message
      properties:
        rule:
          type: string
          enum:
            - ASSIGNEE_MUST_BE_MEMBER
            - ZONE_MUST_EXIST
            - DEADLINE_MUST_BE_FUTURE
            - INITIATOR_MUST_HAVE_PERMISSION
            - TASK_ALREADY_COMPLETED
            - COMMAND_ATTRIBUTE_CONFLICT
            - SCHEDULE_AT_MUST_BE_FUTURE
          description: Business rule that was violated
        message:
          type: string
          description: Human-readable explanation

    AuthErrorResponse:
      type: object
      required:
        - errorCode
        - message
      properties:
        correlationId:
          type: [string, 'null']
          format: uuid
        errorCode:
          type: string
          enum:
            - AUTH_TOKEN_MISSING
            - AUTH_TOKEN_INVALID
            - AUTH_TOKEN_EXPIRED
            - AUTH_INVALID_CREDENTIALS
            - AUTH_EMAIL_EXISTS
            - AUTH_REFRESH_REQUIRED
            - AUTH_PROVIDER_UNAVAILABLE
            - SCHEMA_INVALID
        message:
          type: string
        validationErrors:
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
        violations:
          type: array
          items:
            $ref: '#/components/schemas/BusinessViolation'

    # Domain entities
    UserProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
        externalId:
          type: string
          description: Keycloak subject claim
        email:
          type: [string, 'null']
          format: email
          description: Normalized email address when known.
        emailVerified:
          type: boolean
          description: Whether HomeTusk may treat the stored email as verified.
        emailSource:
          type: string
          enum:
            - idp_claim
            - manual
            - unknown
          description: Source of the current email value.
        emailUpdatedAt:
          type: [string, 'null']
          format: date-time
          description: Timestamp when the email value last changed.
        emailNotificationEligible:
          type: boolean
          description: True only when email is present and verified.
        displayName:
          type: string
        avatarUrl:
          type: string
          format: uri
        households:
          type: array
          items:
            $ref: '#/components/schemas/HouseholdSummary'
        createdAt:
          type: string
          format: date-time

    HouseholdSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        role:
          type: string
          enum: [admin, member]

    Household:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        createdAt:
          type: string
          format: date-time

    HouseholdMember:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        displayName:
          type: string
        email:
          type: string
          format: email
        role:
          type: string
          enum: [admin, member]
        joinedAt:
          type: string
          format: date-time

    Zone:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        householdId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time

    Task:
      type: object
      properties:
        id:
          type: string
          format: uuid
        householdId:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [open, in_progress, done, cancelled]
        assignee:
          $ref: '#/components/schemas/UserSummary'
        zone:
          $ref: '#/components/schemas/Zone'
        deadline:
          type: string
          format: date-time
        createdBy:
          $ref: '#/components/schemas/UserSummary'
        commandId:
          type: string
          format: uuid
          description: Command that created this task
        createdVia:
          type: string
          enum: [command, fallback, direct, routine, scheduler]
        routine:
          $ref: '#/components/schemas/RoutineSummary'
          description: Source routine (if generated from a routine)
        scheduledDate:
          type: [string, 'null']
          format: date
          description: Scheduled date for routine instance (null for manual tasks)
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time

    UserSummary:
      type: object
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string

    RoutineSummary:
      type: object
      description: Summary of source routine for routine-generated tasks
      required:
        - id
        - title
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
          description: Routine title (e.g., "Мыть посуду")
        status:
          type: string
          enum: [ACTIVE, PAUSED, DELETED]
          description: Routine status (DELETED if routine was removed)

    AnalyticsSummary:
      type: object
      required:
        - householdId
        - period
        - periodStart
        - periodEnd
        - perMember
        - perZone
        - fairness
      properties:
        householdId:
          type: string
          format: uuid
        period:
          type: string
          enum: [7d, 30d]
        periodStart:
          type: string
          format: date-time
        periodEnd:
          type: string
          format: date-time
        perMember:
          type: array
          description: Stats per household member
          items:
            $ref: '#/components/schemas/MemberStats'
        perZone:
          type: array
          description: Stats per zone
          items:
            $ref: '#/components/schemas/ZoneStats'
        fairness:
          $ref: '#/components/schemas/FairnessInfo'
        overdueTop:
          type: array
          description: Top overdue tasks (optional, max 5)
          items:
            $ref: '#/components/schemas/OverdueTask'

    MemberStats:
      type: object
      required:
        - memberId
        - memberName
        - completedCount
        - overdueCount
        - openCount
      properties:
        memberId:
          type: string
          format: uuid
        memberName:
          type: string
        completedCount:
          type: integer
          minimum: 0
          description: Tasks completed in period
        overdueCount:
          type: integer
          minimum: 0
          description: Currently overdue tasks assigned to member
        openCount:
          type: integer
          minimum: 0
          description: Currently open tasks assigned to member

    ZoneStats:
      type: object
      required:
        - zoneId
        - zoneName
        - completedCount
        - overdueCount
      properties:
        zoneId:
          type: string
          format: uuid
        zoneName:
          type: string
        completedCount:
          type: integer
          minimum: 0
          description: Tasks completed in zone during period
        overdueCount:
          type: integer
          minimum: 0
          description: Currently overdue tasks in zone

    FairnessInfo:
      type: object
      required:
        - gini
        - balance
        - formula
        - interpretation
      properties:
        gini:
          type: [number, 'null']
          format: float
          minimum: 0
          maximum: 1
          description: Gini coefficient (0=equal, 1=unequal). Null if no tasks.
        balance:
          type: [integer, 'null']
          minimum: 0
          maximum: 100
          description: Balance score = round((1-gini)*100). Null if no tasks.
        formula:
          type: string
          description: Human-readable formula explanation
          example: "Balance = 100 × (1 - Gini coefficient)"
        interpretation:
          type: string
          description: What this score means for the household
          example: "Balance score 75 — good distribution of tasks among members."

    OverdueTask:
      type: object
      required:
        - taskId
        - title
        - assigneeName
        - daysOverdue
      properties:
        taskId:
          type: string
          format: uuid
        title:
          type: string
        assigneeName:
          type: string
        daysOverdue:
          type: integer
          minimum: 1

    GamificationProgressResponse:
      type: object
      required:
        - userId
        - totalPoints
        - pointsThisWeek
        - earnedBadges
        - recentActivity
        - householdTotalTasks
        - householdTotalPoints
      properties:
        userId:
          type: string
          format: uuid
        totalPoints:
          type: integer
        pointsThisWeek:
          type: integer
        earnedBadges:
          type: array
          items:
            $ref: '#/components/schemas/BadgeDto'
        recentActivity:
          type: array
          items:
            $ref: '#/components/schemas/PointsEntry'
        householdTotalTasks:
          type: integer
        householdTotalPoints:
          type: integer

    BadgeCatalogResponse:
      type: object
      required:
        - badges
      properties:
        badges:
          type: array
          items:
            $ref: '#/components/schemas/BadgeDto'

    PointsEntry:
      type: object
      required:
        - id
        - points
        - reason
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        taskId:
          type: [string, 'null']
          format: uuid
        points:
          type: integer
        reason:
          type: string
          enum:
            - task_completed
            - on_time_bonus
            - task_uncompleted
            - on_time_bonus_reversed
        createdAt:
          type: string
          format: date-time

    BadgeDto:
      type: object
      required:
        - code
        - name
        - description
        - criteria
        - iconName
        - earned
      properties:
        code:
          type: string
        name:
          type: string
        description:
          type: string
        criteria:
          type: string
        iconName:
          type: string
        earned:
          type: boolean
        earnedAt:
          type: [string, 'null']
          format: date-time

    # Request schemas
    CreateHouseholdRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
          description: Household name (trimmed, non-blank)

    CreateZoneRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255

    AcceptInviteRequest:
      type: object
      required:
        - inviteToken
      properties:
        inviteToken:
          type: string
          description: Invite token (hti_ prefix)

    CreateInviteResponse:
      type: object
      required:
        - inviteToken
        - expiresAt
        - status
      properties:
        inviteToken:
          type: string
        expiresAt:
          type: string
          format: date-time
        status:
          type: string
          enum: [active, redeemed, expired, revoked]
        inviteLink:
          type: [string, 'null']

    InviteMembership:
      type: object
      required:
        - id
        - role
        - joinedAt
      properties:
        id:
          type: string
          format: uuid
        role:
          type: string
          enum: [admin, member]
        joinedAt:
          type: string
          format: date-time

    AcceptInviteResponse:
      type: object
      required:
        - membership
        - household
      properties:
        membership:
          $ref: '#/components/schemas/InviteMembership'
        household:
          $ref: '#/components/schemas/Household'

    # Notification schemas
    Notification:
      type: object
      required:
        - id
        - householdId
        - userId
        - type
        - payload
        - createdAt
      properties:
        id:
          type: string
          format: uuid
        householdId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        type:
          type: string
          enum:
            - invite_accepted
            - task_assigned
            - task_completed
            - shopping_item_added
            - shopping_item_purchased
            - badge_earned
        payload:
          $ref: '#/components/schemas/NotificationPayload'
        createdAt:
          type: string
          format: date-time
        readAt:
          type: [string, 'null']
          format: date-time
        correlationId:
          type: [string, 'null']
          format: uuid

    NotificationPayload:
      type: object
      properties:
        actorUserId:
          type: string
          format: uuid
        entityId:
          type: string
          format: uuid
        entityType:
          type: string
          description: Entity type (task, shopping_item, invite)
        summary:
          type: string
          description: Human-readable summary

    # Shopping schemas
    ShoppingList:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        householdId:
          type: string
          format: uuid
        unpurchasedCount:
          type: integer
          description: Count of unpurchased items
        createdAt:
          type: string
          format: date-time

    CreateShoppingListRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 80
          description: User-visible shopping list name. Server trims surrounding whitespace.

    ShoppingItemCategory:
      type: string
      description: Optional coarse shopping category for grouping and filtering.
      enum:
        - groceries
        - cleaning
        - personal_care
        - diy
        - electronics
        - other

    ShoppingItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        quantity:
          type: integer
        unit:
          type: string
        category:
          oneOf:
            - $ref: '#/components/schemas/ShoppingItemCategory'
            - type: 'null'
          description: Optional category for grouping/filtering. Null for uncategorised legacy items.
        source:
          type: [string, 'null']
          maxLength: 120
          description: Optional source/store name. User-provided, household-scoped display text.
        purchased:
          type: boolean
        linkedTaskId:
          type: [string, 'null']
          format: uuid
          description: Associated task (if any)
        addedBy:
          $ref: '#/components/schemas/UserSummary'
        createdAt:
          type: string
          format: date-time
        purchasedAt:
          type: string
          format: date-time

    AddShoppingItemRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        quantity:
          type: integer
          minimum: 1
          default: 1
        unit:
          type: string
          maxLength: 50
        category:
          oneOf:
            - $ref: '#/components/schemas/ShoppingItemCategory'
            - type: 'null'
          description: Optional category. Omit or null to leave uncategorised.
        source:
          type: [string, 'null']
          maxLength: 120
          description: Optional source/store name. Server trims blank values to null.
        linkedTaskId:
          type: [string, 'null']
          format: uuid
          description: Optional same-household task link. Invalid cross-household links return 404.

    UpdateShoppingItemRequest:
      type: object
      description: Partial shopping item update; at least one field is required.
      properties:
        purchased:
          type: boolean
          description: Optional purchase status change.
        category:
          oneOf:
            - $ref: '#/components/schemas/ShoppingItemCategory'
            - type: 'null'
          description: Optional category update. Null clears the category.
        source:
          type: [string, 'null']
          maxLength: 120
          description: Optional source/store update. Null or blank clears the source.
        linkedTaskId:
          type: [string, 'null']
          format: uuid
          description: Optional task-link update. Omit to keep current link; null unlinks.

    # Task detail with linked shopping items
    TaskDetail:
      allOf:
        - $ref: '#/components/schemas/Task'
        - type: object
          properties:
            linkedShoppingItems:
              type: array
              items:
                $ref: '#/components/schemas/ShoppingItem'
