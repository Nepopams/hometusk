openapi: 3.1.0
info:
  title: HomeTusk Routines API
  version: 1.0.0
  description: |
    API for managing recurring tasks (routines) in households.

    **EP-010:** Recurring Tasks & Scheduling v0

    Routines automate repetitive task creation with configurable:
    - Recurrence rules (daily, weekly, monthly, every-N-days)
    - Assignment policies (fixed, round-robin, manual)
    - Generation window (7 days ahead by default)

    See also:
    - [Epic EP-010](../../../docs/planning/epics/EP-010/epic.md)
    - [ADR-013](../../../docs/adr/013-routine-scheduler-design.md)

servers:
  - url: /api/v1
    description: API version 1

security:
  - bearerAuth: []

tags:
  - name: Routines
    description: Routine CRUD and lifecycle management

paths:
  /households/{householdId}/routines:
    get:
      operationId: listRoutines
      summary: List routines in a household
      description: |
        Returns all routines in the household (ACTIVE, PAUSED).
        DELETED routines are excluded by default.
      tags:
        - Routines
      parameters:
        - $ref: '#/components/parameters/HouseholdIdPath'
        - name: status
          in: query
          required: false
          description: Filter by routine status
          schema:
            type: string
            enum: [ACTIVE, PAUSED, DELETED]
        - name: assignmentPolicy
          in: query
          required: false
          description: Filter by assignment policy
          schema:
            $ref: '#/components/schemas/AssignmentPolicy'
      responses:
        '200':
          description: List of routines
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Routine'
              examples:
                twoRoutines:
                  summary: Two active routines
                  value:
                    - id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                      householdId: "123e4567-e89b-12d3-a456-426614174000"
                      title: "Мыть посуду"
                      description: "Ежедневная мойка посуды после ужина"
                      recurrenceRule:
                        type: "DAILY"
                      assignmentPolicy: "ROUND_ROBIN"
                      status: "ACTIVE"
                      generationWindowDays: 7
                      createdAt: "2026-01-28T10:00:00Z"
                      updatedAt: "2026-01-28T10:00:00Z"
                    - id: "b2c3d4e5-f6a7-8901-bcde-f23456789012"
                      householdId: "123e4567-e89b-12d3-a456-426614174000"
                      title: "Уборка кухни"
                      description: null
                      recurrenceRule:
                        type: "WEEKLY"
                        daysOfWeek: ["SATURDAY"]
                      assignmentPolicy: "FIXED"
                      fixedAssigneeId: "user-uuid-here"
                      status: "ACTIVE"
                      generationWindowDays: 7
                      createdAt: "2026-01-28T11:00:00Z"
                      updatedAt: "2026-01-28T11:00:00Z"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

    post:
      operationId: createRoutine
      summary: Create a new routine
      description: |
        Creates a routine with recurrence rule and assignment policy.
        Scheduler will start generating task instances within the generation window.
      tags:
        - Routines
      parameters:
        - $ref: '#/components/parameters/HouseholdIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoutineRequest'
            examples:
              dailyRoundRobin:
                summary: Daily routine with round-robin
                value:
                  title: "Мыть посуду"
                  description: "Ежедневная мойка посуды"
                  recurrenceRule:
                    type: "DAILY"
                  assignmentPolicy: "ROUND_ROBIN"
              weeklySaturday:
                summary: Weekly routine on Saturday
                value:
                  title: "Уборка кухни"
                  zoneId: "zone-uuid-here"
                  recurrenceRule:
                    type: "WEEKLY"
                    daysOfWeek: ["SATURDAY"]
                  assignmentPolicy: "FIXED"
                  fixedAssigneeId: "user-uuid-here"
              everyThreeDays:
                summary: Every 3 days manual assignment
                value:
                  title: "Вынести мусор"
                  recurrenceRule:
                    type: "EVERY_N_DAYS"
                    interval: 3
                  assignmentPolicy: "MANUAL"
      responses:
        '201':
          description: Routine created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Routine'
        '400':
          description: Invalid request (validation error)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                invalidRule:
                  summary: Invalid recurrence rule
                  value:
                    errorCode: "VALIDATION_ERROR"
                    message: "Invalid recurrence rule"
                    validationErrors:
                      - path: "$.recurrenceRule.daysOfWeek"
                        code: "REQUIRED_FOR_WEEKLY"
                        message: "daysOfWeek is required for WEEKLY type"
                nonMemberAssignee:
                  summary: Fixed assignee not a member
                  value:
                    errorCode: "BUSINESS_RULE_VIOLATION"
                    message: "Fixed assignee must be household member"
                    violations:
                      - rule: "ASSIGNEE_MUST_BE_MEMBER"
                        message: "User xxx is not a member of this household"
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /households/{householdId}/routines/{routineId}:
    get:
      operationId: getRoutine
      summary: Get a specific routine
      tags:
        - Routines
      parameters:
        - $ref: '#/components/parameters/HouseholdIdPath'
        - $ref: '#/components/parameters/RoutineIdPath'
      responses:
        '200':
          description: Routine details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Routine'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    patch:
      operationId: updateRoutine
      summary: Partially update a routine
      description: |
        Updates only the fields provided in the request body.
        Omitted fields are not modified (null is not the same as omitted).

        **Note:** Changing recurrenceRule does not affect already-generated instances.
      tags:
        - Routines
      parameters:
        - $ref: '#/components/parameters/HouseholdIdPath'
        - $ref: '#/components/parameters/RoutineIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoutineRequest'
            examples:
              updateTitle:
                summary: Update title only
                value:
                  title: "Мыть посуду после ужина"
              changePolicy:
                summary: Change assignment policy
                value:
                  assignmentPolicy: "FIXED"
                  fixedAssigneeId: "user-uuid-here"
      responses:
        '200':
          description: Routine updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Routine'
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

    delete:
      operationId: deleteRoutine
      summary: Soft delete a routine
      description: |
        Marks routine as DELETED (soft delete).

        **Behavior (v0):**
        - Pending (not-started) task instances remain in task list
        - Completed instances always kept for history
        - No new instances will be generated

        Users can manually delete remaining task instances if desired.
      tags:
        - Routines
      parameters:
        - $ref: '#/components/parameters/HouseholdIdPath'
        - $ref: '#/components/parameters/RoutineIdPath'
      responses:
        '204':
          description: Routine deleted (soft delete)
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /households/{householdId}/routines/{routineId}/pause:
    post:
      operationId: pauseRoutine
      summary: Pause a routine
      description: |
        Pauses the routine. Scheduler will stop generating new instances.
        Existing pending instances remain unchanged.

        **Idempotent:** Pausing an already-paused routine is a no-op (returns 200).
      tags:
        - Routines
      parameters:
        - $ref: '#/components/parameters/HouseholdIdPath'
        - $ref: '#/components/parameters/RoutineIdPath'
      responses:
        '200':
          description: Routine paused (or already paused)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Routine'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Cannot pause (routine is deleted)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              examples:
                deleted:
                  summary: Routine is deleted
                  value:
                    errorCode: "INVALID_STATE"
                    message: "Cannot pause a deleted routine"

  /households/{householdId}/routines/{routineId}/resume:
    post:
      operationId: resumeRoutine
      summary: Resume a paused routine
      description: |
        Resumes a paused routine. Scheduler will continue generating new instances.

        **Idempotent:** Resuming an already-active routine is a no-op (returns 200).

        **Note:** Dates missed during pause are NOT backfilled (per ADR-013).
      tags:
        - Routines
      parameters:
        - $ref: '#/components/parameters/HouseholdIdPath'
        - $ref: '#/components/parameters/RoutineIdPath'
      responses:
        '200':
          description: Routine resumed (or already active)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Routine'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Cannot resume (routine is deleted)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /households/{householdId}/routines/{routineId}/upcoming:
    get:
      operationId: getUpcomingInstances
      summary: Preview upcoming task instances
      description: |
        Returns a preview of task instances that would be generated
        within the generation window. Does not create actual tasks.

        Useful for UI preview before committing to a recurrence rule.
      tags:
        - Routines
      parameters:
        - $ref: '#/components/parameters/HouseholdIdPath'
        - $ref: '#/components/parameters/RoutineIdPath'
        - name: days
          in: query
          required: false
          description: Number of days to preview (default and max = generationWindowDays)
          schema:
            type: integer
            minimum: 1
            maximum: 30
            default: 7
      responses:
        '200':
          description: List of upcoming dates and projected assignees
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UpcomingInstancesResponse'
              examples:
                weekPreview:
                  summary: Week preview with round-robin
                  value:
                    routineId: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
                    routineTitle: "Мыть посуду"
                    instances:
                      - scheduledDate: "2026-01-29"
                        projectedAssignee:
                          id: "user-1-uuid"
                          displayName: "Алиса"
                        alreadyGenerated: true
                      - scheduledDate: "2026-01-30"
                        projectedAssignee:
                          id: "user-2-uuid"
                          displayName: "Борис"
                        alreadyGenerated: true
                      - scheduledDate: "2026-01-31"
                        projectedAssignee:
                          id: "user-1-uuid"
                          displayName: "Алиса"
                        alreadyGenerated: false
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Keycloak JWT token

  parameters:
    HouseholdIdPath:
      name: householdId
      in: path
      required: true
      description: Household UUID
      schema:
        type: string
        format: uuid

    RoutineIdPath:
      name: routineId
      in: path
      required: true
      description: Routine UUID
      schema:
        type: string
        format: uuid

  responses:
    Unauthorized:
      description: Authentication required or token invalid
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            tokenMissing:
              value:
                errorCode: "AUTH_TOKEN_MISSING"
                message: "Authorization header is required"

    Forbidden:
      description: User does not have access to this household
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            notMember:
              value:
                errorCode: "ACCESS_DENIED"
                message: "You are not a member of this household"

    NotFound:
      description: Routine not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
          examples:
            notFound:
              value:
                errorCode: "NOT_FOUND"
                message: "Routine not found"

  schemas:
    # === Recurrence Rules (RRULE-lite) ===
    RecurrenceRule:
      oneOf:
        - $ref: '#/components/schemas/DailyRule'
        - $ref: '#/components/schemas/WeeklyRule'
        - $ref: '#/components/schemas/MonthlyRule'
        - $ref: '#/components/schemas/EveryNDaysRule'
      discriminator:
        propertyName: type
        mapping:
          DAILY: '#/components/schemas/DailyRule'
          WEEKLY: '#/components/schemas/WeeklyRule'
          MONTHLY: '#/components/schemas/MonthlyRule'
          EVERY_N_DAYS: '#/components/schemas/EveryNDaysRule'

    DailyRule:
      type: object
      required:
        - type
      properties:
        type:
          type: string
          enum: [DAILY]
          description: Every day
      example:
        type: "DAILY"

    WeeklyRule:
      type: object
      required:
        - type
        - daysOfWeek
      properties:
        type:
          type: string
          enum: [WEEKLY]
        daysOfWeek:
          type: array
          minItems: 1
          maxItems: 7
          items:
            type: string
            enum: [MONDAY, TUESDAY, WEDNESDAY, THURSDAY, FRIDAY, SATURDAY, SUNDAY]
          description: Days of week when task should occur
      example:
        type: "WEEKLY"
        daysOfWeek: ["MONDAY", "WEDNESDAY", "FRIDAY"]

    MonthlyRule:
      type: object
      required:
        - type
        - dayOfMonth
      properties:
        type:
          type: string
          enum: [MONTHLY]
        dayOfMonth:
          type: integer
          minimum: 1
          maximum: 31
          description: |
            Day of month (1-31). If month has fewer days,
            last day of month is used (e.g., 31 -> 28 for Feb).
      example:
        type: "MONTHLY"
        dayOfMonth: 1

    EveryNDaysRule:
      type: object
      required:
        - type
        - interval
      properties:
        type:
          type: string
          enum: [EVERY_N_DAYS]
        interval:
          type: integer
          minimum: 2
          maximum: 365
          description: Number of days between occurrences
      example:
        type: "EVERY_N_DAYS"
        interval: 3

    # === Assignment Policy ===
    AssignmentPolicy:
      type: string
      enum:
        - FIXED
        - ROUND_ROBIN
        - MANUAL
      description: |
        - FIXED: Always assign to fixedAssigneeId
        - ROUND_ROBIN: Rotate among household members
        - MANUAL: No auto-assign; user assigns manually

    # === Routine Entity ===
    Routine:
      type: object
      required:
        - id
        - householdId
        - title
        - recurrenceRule
        - assignmentPolicy
        - status
        - generationWindowDays
        - createdBy
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          format: uuid
        householdId:
          type: string
          format: uuid
        title:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          maxLength: 2000
          nullable: true
        zone:
          $ref: '#/components/schemas/ZoneSummary'
        recurrenceRule:
          $ref: '#/components/schemas/RecurrenceRule'
        assignmentPolicy:
          $ref: '#/components/schemas/AssignmentPolicy'
        fixedAssignee:
          $ref: '#/components/schemas/UserSummary'
          description: Present when assignmentPolicy = FIXED
        status:
          type: string
          enum: [ACTIVE, PAUSED, DELETED]
        generationWindowDays:
          type: integer
          minimum: 1
          maximum: 30
          default: 7
        createdBy:
          $ref: '#/components/schemas/UserSummary'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        pausedAt:
          type: string
          format: date-time
          nullable: true
          description: Timestamp when routine was paused

    # === Request Schemas ===
    CreateRoutineRequest:
      type: object
      required:
        - title
        - recurrenceRule
        - assignmentPolicy
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          maxLength: 2000
        zoneId:
          type: string
          format: uuid
          description: Zone for generated tasks (must exist in household)
        recurrenceRule:
          $ref: '#/components/schemas/RecurrenceRule'
        assignmentPolicy:
          $ref: '#/components/schemas/AssignmentPolicy'
        fixedAssigneeId:
          type: string
          format: uuid
          description: |
            Required when assignmentPolicy = FIXED.
            Must be a household member.
        generationWindowDays:
          type: integer
          minimum: 1
          maximum: 30
          default: 7

    UpdateRoutineRequest:
      type: object
      description: |
        Partial update - only provided non-null fields are modified.
        Omitting a field or sending null means "don't change it".

        **v0 limitation:** Cannot explicitly clear fields to null.
        To clear description, send empty string "".
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          maxLength: 2000
          nullable: true
          description: Set to null to clear description
        zoneId:
          type: string
          format: uuid
          nullable: true
          description: Set to null to remove zone
        recurrenceRule:
          $ref: '#/components/schemas/RecurrenceRule'
        assignmentPolicy:
          $ref: '#/components/schemas/AssignmentPolicy'
        fixedAssigneeId:
          type: string
          format: uuid
          nullable: true
          description: Required when changing to FIXED policy
        generationWindowDays:
          type: integer
          minimum: 1
          maximum: 30

    # === Response Schemas ===
    UpcomingInstancesResponse:
      type: object
      required:
        - routineId
        - routineTitle
        - instances
      properties:
        routineId:
          type: string
          format: uuid
        routineTitle:
          type: string
        instances:
          type: array
          items:
            $ref: '#/components/schemas/UpcomingInstance'

    UpcomingInstance:
      type: object
      required:
        - scheduledDate
        - alreadyGenerated
      properties:
        scheduledDate:
          type: string
          format: date
          description: Date when task instance is scheduled
        projectedAssignee:
          $ref: '#/components/schemas/UserSummary'
          description: Projected assignee (for FIXED/ROUND_ROBIN policies)
        alreadyGenerated:
          type: boolean
          description: True if task instance already exists for this date

    # === Shared Schemas ===
    UserSummary:
      type: object
      required:
        - id
        - displayName
      properties:
        id:
          type: string
          format: uuid
        displayName:
          type: string

    ZoneSummary:
      type: object
      required:
        - id
        - name
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string

    ErrorResponse:
      type: object
      required:
        - errorCode
        - message
      properties:
        errorCode:
          type: string
          description: Machine-readable error code
        message:
          type: string
          description: Human-readable error message
        validationErrors:
          type: array
          items:
            $ref: '#/components/schemas/ValidationError'
        violations:
          type: array
          items:
            $ref: '#/components/schemas/BusinessViolation'

    ValidationError:
      type: object
      required:
        - path
        - code
        - message
      properties:
        path:
          type: string
          description: JSON path to invalid field
        code:
          type: string
        message:
          type: string

    BusinessViolation:
      type: object
      required:
        - rule
        - message
      properties:
        rule:
          type: string
          enum:
            - ASSIGNEE_MUST_BE_MEMBER
            - ZONE_MUST_EXIST
            - INVALID_RECURRENCE_RULE
        message:
          type: string
