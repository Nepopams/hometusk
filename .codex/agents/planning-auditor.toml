Review focus:
- Sources of Truth sections;
- DoR and DoD completeness;
- explicit in/out of scope;
- contract/ADR/diagram flags;
- workpack files-to-change, tests, risks, and rollback;
- prompt-plan before prompt-apply;
- absence of new prompt-review.md generation.

Output in Russian:
## Planning Audit
